:root{
  /* Paleta extraída de alimeythor.com */
  --rojo:#F8231C;   --rojo-oscuro:#B51410;
  --verde:#3FB411;  --verde-oscuro:#2A8A0A;
  --naranja:#F8A00A;--naranja-oscuro:#B56E00;
  --celeste:#33AFED;--celeste-oscuro:#1F7FB0;
  --amarillo:#FFC93D;
  --crema:#FFF8F5;
  --tinta:#1A1A2E;
  --tinta-suave:#5A5A72;
  --halo:radial-gradient(circle, rgba(255,250,210,.9) 0%, rgba(248,160,10,.35) 60%, rgba(0,0,0,0) 75%);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%; overflow:hidden; overscroll-behavior:none;
  background:var(--crema); color:var(--tinta);
  font-family:'Poppins',system-ui,sans-serif;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}

/* ---------- Escenario ---------- */
#app{
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
  background:
    radial-gradient(80% 70% at 50% 55%, rgba(63,180,17,.16) 0%, rgba(0,0,0,0) 70%),
    linear-gradient(rgba(255,250,240,.3) 0%, rgba(255,248,240,.1) 45%, var(--crema) 100%),
    var(--crema);
}

/* Blobs mágicos de fondo */
.blob{position:absolute;border-radius:50%;filter:blur(48px);opacity:.5;pointer-events:none;z-index:0;}
.blob.b1{width:44vmin;height:44vmin;background:rgba(248,35,28,.13);top:-10vmin;left:-8vmin;animation:flotar 17s ease-in-out infinite;}
.blob.b2{width:52vmin;height:52vmin;background:rgba(63,180,17,.14);bottom:-14vmin;right:-10vmin;animation:flotar 21s ease-in-out infinite reverse;}
.blob.b3{width:34vmin;height:34vmin;background:rgba(51,175,237,.13);bottom:6vmin;left:-6vmin;animation:flotar 25s ease-in-out infinite;}
@keyframes flotar{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vmin,5vmin) scale(1.12)}}

/* ---------- Header ---------- */
#logo{
  position:absolute; top:max(12px, env(safe-area-inset-top)); left:50%;
  transform:translateX(-50%);
  height:clamp(58px,11vmin,104px); width:auto; z-index:6;
  filter:drop-shadow(0 4px 10px rgba(248,160,10,.35));
  pointer-events:none;
}
/* Horizontal: el logo se corre a la esquina para no pelear con el puntero */
@media (orientation:landscape){
  #logo{ left:max(14px, env(safe-area-inset-left)); transform:none;
         height:clamp(52px,10vmin,88px); }
}

#btn-sonido{
  position:absolute; top:max(12px, env(safe-area-inset-top)); right:max(12px, env(safe-area-inset-right));
  z-index:20;
  width:46px; height:46px; border-radius:50%;
  border:2px solid rgba(26,26,46,.09);
  background:rgba(255,255,255,.72);
  color:var(--tinta-suave);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:.45; transition:opacity .2s, transform .12s;
  backdrop-filter:blur(6px);
}
#btn-sonido:active{transform:scale(.9);}
#btn-sonido.mudo{opacity:.85; color:var(--rojo); border-color:rgba(248,35,28,.25);}
#btn-sonido svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ---------- Personaje (modo atracción) ---------- */
#personaje{
  position:absolute; z-index:5; pointer-events:none;
  height:clamp(130px, 26vmin, 260px); width:auto;
  filter:drop-shadow(0 14px 26px rgba(181,110,0,.28));
  animation:flotarPers 4.6s ease-in-out infinite;
  transition:opacity .5s ease, transform .5s ease;
}
#personaje::after{content:'';}
@keyframes flotarPers{
  0%,100%{transform:translateY(0) rotate(-2.5deg)}
  50%{transform:translateY(-16px) rotate(2.5deg)}
}
/* halo dorado detrás del personaje */
#halo-pers{
  position:absolute; z-index:4; pointer-events:none;
  width:clamp(190px, 36vmin, 360px); aspect-ratio:1;
  background:var(--halo);
  animation:latirHalo 4.6s ease-in-out infinite;
  transition:opacity .5s ease;
}
@keyframes latirHalo{0%,100%{transform:scale(.92);opacity:.75}50%{transform:scale(1.08);opacity:1}}

/* Vertical: personaje abajo a la izquierda */
#personaje{left:2vw; bottom:1vh;}
#halo-pers{left:calc(2vw - 6vmin); bottom:calc(1vh - 6vmin);}
/* Horizontal: personaje al costado, más protagonista */
@media (orientation:landscape){
  #personaje{left:3vw; bottom:auto; top:50%; transform-origin:center;
    height:clamp(180px, 46vmin, 420px);}
  #halo-pers{left:1vw; top:50%; bottom:auto; transform:translateY(-50%);
    width:clamp(240px, 58vmin, 520px);}
  @keyframes flotarPers{
    0%,100%{transform:translateY(-50%) rotate(-2.5deg)}
    50%{transform:translateY(calc(-50% - 16px)) rotate(2.5deg)}
  }
  @keyframes latirHalo{0%,100%{transform:translateY(-50%) scale(.92);opacity:.75}50%{transform:translateY(-50%) scale(1.08);opacity:1}}
}
body.girando #personaje, body.girando #halo-pers{opacity:0;}

/* ---------- Ruleta ---------- */
#escena{
  position:relative; z-index:8;
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(12px, 2.6vmin, 30px);
  margin-top:clamp(44px, 8vmin, 76px);
}

#wheel-wrap{
  position:relative;
  width:min(84vw, 54vh, 560px);
  aspect-ratio:1;
}
@media (orientation:landscape){
  #wheel-wrap{width:min(56vw, 68vh, 560px);}
}

/* resplandor dorado detrás de la ruleta — el halo de la marca */
#wheel-wrap::before{
  content:''; position:absolute; inset:-16%;
  background:var(--halo);
  animation:latirHalo 5.5s ease-in-out infinite;
  animation-name:latirHaloRuleta;
  pointer-events:none;
}
@keyframes latirHaloRuleta{0%,100%{transform:scale(.94);opacity:.7}50%{transform:scale(1.06);opacity:1}}

#wheel{position:absolute;inset:0;width:100%;height:100%;overflow:visible;display:block;}
#gWheel{transform-origin:0 0;}

.sector{stroke:rgba(255,248,245,.95); stroke-width:1.6;}
.etiqueta{
  font-family:'Chewy',sans-serif; font-size:8.2px; fill:#fff;
  text-anchor:middle;
  stroke:rgba(26,26,46,.5); stroke-width:2.6px; paint-order:stroke fill;
  stroke-linejoin:round;
}
.icono{fill:#fff; stroke:rgba(26,26,46,.45); stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round;}
.icono .ink{fill:var(--tinta); stroke:none;}
.icono .oro{fill:var(--amarillo); stroke:rgba(26,26,46,.45); stroke-width:1.4;}
.icono .traza{fill:none; stroke:var(--tinta); stroke-width:3.4; stroke-linecap:round; stroke-dasharray:0.1 5.2;}

/* ---------- Botón principal ---------- */
#btn-girar{
  position:relative; z-index:12;
  font-family:'Chewy',sans-serif;
  font-size:clamp(22px, 4.4vmin, 42px);
  letter-spacing:.4px;
  color:#fff;
  background:var(--rojo);
  border:none; border-radius:999px;
  padding:clamp(14px,2.4vmin,22px) clamp(30px,6vmin,64px);
  cursor:pointer;
  box-shadow:0 8px 0 0 var(--rojo-oscuro), 0 16px 30px 0 rgba(248,35,28,.4);
  transition:transform .09s ease, box-shadow .09s ease, opacity .25s ease, filter .25s ease;
  animation:latirBoton 2.1s ease-in-out infinite;
  text-shadow:0 2px 0 rgba(0,0,0,.14);
}
#btn-girar:active:not(:disabled){
  transform:translateY(7px);
  box-shadow:0 1px 0 0 var(--rojo-oscuro), 0 6px 14px 0 rgba(248,35,28,.35);
}
#btn-girar:disabled{
  cursor:default; animation:none;
  filter:grayscale(.55); opacity:.5;
  transform:translateY(5px);
  box-shadow:0 3px 0 0 var(--rojo-oscuro);
}
@keyframes latirBoton{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.045)}
}

#pista{
  font-family:'Poppins',sans-serif; font-weight:600;
  font-size:clamp(12px, 2vmin, 18px);
  color:var(--tinta-suave); text-align:center;
  min-height:1.4em;
  transition:opacity .45s ease;
  z-index:12; position:relative;
}
body.girando #pista, body.girando #btn-girar{}

/* ---------- Canvas de partículas ---------- */
#fx{position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:30;}

/* ---------- Festejo ---------- */
#festejo{
  position:fixed; inset:0; z-index:40;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:clamp(8px,1.8vmin,18px);
  padding:6vmin;
  background:
    radial-gradient(circle at 50% 45%, rgba(255,252,238,.95) 0%, rgba(255,226,150,.55) 38%, rgba(255,200,120,0) 72%),
    rgba(255,248,245,.97);
  backdrop-filter:blur(3px);
  opacity:0; visibility:hidden;
  transition:opacity .45s ease, visibility .45s;
  text-align:center;
}
#festejo.on{opacity:1; visibility:visible;}

#f-titulo{
  font-family:'Chewy',sans-serif;
  font-size:clamp(34px, 8vmin, 82px);
  color:var(--rojo);
  text-shadow:0 4px 0 rgba(181,20,16,.28), 0 12px 26px rgba(248,35,28,.25);
  transform:scale(.4); opacity:0;
}
#festejo.on #f-titulo{animation:entraPop .62s cubic-bezier(.2,1.7,.4,1) .1s forwards;}

#f-icono{
  width:clamp(96px, 20vmin, 190px); aspect-ratio:1;
  transform:scale(.2) rotate(-40deg); opacity:0;
}
#festejo.on #f-icono{animation:entraPop .7s cubic-bezier(.2,1.7,.4,1) .26s forwards;}
#f-icono svg{width:100%;height:100%;overflow:visible;
  filter:drop-shadow(0 10px 18px rgba(26,26,46,.22));
  animation:balancea 2.6s ease-in-out .9s infinite;}

#f-premio{
  font-family:'Chewy',sans-serif;
  font-size:clamp(26px, 6vmin, 60px);
  line-height:1.12;
  color:var(--tinta);
  max-width:16ch;
  transform:translateY(24px); opacity:0;
}
#festejo.on #f-premio{animation:entraSube .5s ease .46s forwards;}

#f-msg{
  font-family:'Poppins',sans-serif; font-weight:600;
  font-size:clamp(14px, 2.5vmin, 22px);
  color:var(--tinta-suave); max-width:22ch; line-height:1.5;
  transform:translateY(20px); opacity:0;
}
#festejo.on #f-msg{animation:entraSube .5s ease .62s forwards;}

#f-msg b{color:var(--verde-oscuro); font-weight:800;}

#f-barra{
  width:min(240px,52vw); height:7px; border-radius:99px;
  background:rgba(26,26,46,.09); overflow:hidden; margin-top:clamp(6px,1.4vmin,14px);
}
#f-barra i{display:block; height:100%; width:100%; border-radius:99px;
  background:linear-gradient(90deg,var(--naranja),var(--amarillo));
  transform-origin:left center; transform:scaleX(1);}
#f-pie{font-family:'Poppins',sans-serif;font-size:clamp(10px,1.5vmin,13px);
  color:rgba(26,26,46,.32); font-weight:600; letter-spacing:.4px;}

@keyframes entraPop{to{transform:scale(1) rotate(0);opacity:1}}
@keyframes entraSube{to{transform:translateY(0);opacity:1}}
@keyframes balancea{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-8px)}}

/* Pantallas muy bajas en horizontal: compactar */
@media (orientation:landscape) and (max-height:520px){
  #logo{height:34px;}
  #escena{margin-top:38px; gap:10px;}
}
</style>
</head>

  s += `<defs>

      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#1A1A2E" flood-opacity=".22"/>
    </filter>
    <radialGradient id="brilloHub" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#FFF0D8"/>
    </radialGradient>
  </defs>`;

  s += `<g id="gWheel" filter="url(#sombraRuleta)">`;
  // sectores
  P.forEach((p,i)=>{
    const a0=i*SECTOR, a1=(i+1)*SECTOR;
    const [x0,y0]=pt(a0,R_OUT), [x1,y1]=pt(a1,R_OUT);
    const grande = SECTOR>180?1:0;
    s += `<path class="sector" fill="${p.color}" d="M0,0 L${x0},${y0} A${R_OUT},${R_OUT} 0 ${grande} 1 ${x1},${y1} Z"/>`;
  });
  // aro exterior crema + dorado con topes
  s += `<circle cx="0" cy="0" r="${R_OUT+4.5}" fill="none" stroke="#FFF8F5" stroke-width="9"/>`;
  s += `<circle cx="0" cy="0" r="${R_OUT+9}" fill="none" stroke="#FFC93D" stroke-width="2.4"/>`;
  s += `<circle cx="0" cy="0" r="${R_OUT}" fill="none" stroke="rgba(26,26,46,.14)" stroke-width="1.4"/>`;
  // topes decorativos en el aro
  for(let i=0;i<16;i++){
    const [dx,dy]=pt(i*(360/16)+11.25, R_OUT+4.5);
    s += `<circle cx="${dx}" cy="${dy}" r="1.9" fill="#FFC93D" stroke="rgba(181,110,0,.5)" stroke-width=".5"/>`;
  }
  // contenido de cada sector (ícono + nombre)
  // Todos los casilleros se dibujan igual, en sentido radial: ícono hacia afuera,
  // nombre hacia el centro. Sin "flip": como la ruleta frena con el premio ganador
  // arriba (rot = -θm - jitter), la etiqueta ganadora siempre queda derecha
  // (desvío máximo = JITTER = 32°). Verificado sobre 20.000 giros simulados.
  P.forEach((p,i)=>{
    const am = i*SECTOR + SECTOR/2;
    s += `<g transform="rotate(${am})"><g transform="translate(0,-${R_BASE})">
            <g transform="translate(0,-13) scale(.72)">${ICONOS[p.icono]||''}</g>
            <text class="etiqueta" y="9">${p.lineas[0]||''}</text>
            <text class="etiqueta" y="20.5">${p.lineas[1]||''}</text>
          </g></g>`;
  });
  // centro / hub
  s += `<circle cx="0" cy="0" r="18" fill="url(#brilloHub)" stroke="#FFC93D" stroke-width="2.6"/>`;
  s += `<path d="M0,-9.6 L2.6,-2.8 L9.6,-2.8 L4,1.4 L6.2,8.4 L0,4.2 L-6.2,8.4 L-4,1.4 L-9.6,-2.8 L-2.6,-2.8 Z"
          fill="#FFC93D" stroke="#F8A00A" stroke-width="1.4" stroke-linejoin="round"/>`;
  s += `</g>`;

  // puntero dorado (fijo, arriba)
  s += `<g id="gPuntero" style="transform-origin:0px -108px">
          <path d="M0,-82 L-11.5,-107 Q0,-116.5 11.5,-107 Z"
                fill="#FFC93D" stroke="#B56E00" stroke-width="2.4" stroke-linejoin="round"
                filter="url(#sombraRuleta)"/>
          <circle cx="0" cy="-104" r="3.4" fill="#FFF8F5" stroke="#B56E00" stroke-width="1.6"/>
        </g>`;
  svg.innerHTML = s;
}
construirRuleta();

const gWheel   = $('#gWheel');
const gPuntero = $('#gPuntero');

/* ---------- Sonido (WebAudio sintetizado, sin archivos) ---------- */
const Audio_ = {
  ctx:null, master:null, on:CONFIG.sonidoInicial,
  init(){
    if(this.ctx) return;
    const AC = window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.on?0.5:0;
    this.master.connect(this.ctx.destination);
  },
  resume(){ this.init(); if(this.ctx && this.ctx.state==='suspended') this.ctx.resume(); },
  set(on){
    this.on = on; this.init();
    if(this.master) this.master.gain.setTargetAtTime(on?0.5:0, this.ctx.currentTime, .02);
  },
  tono(freq, dur, tipo='triangle', vol=.3, delay=0){
    if(!this.on||!this.ctx) return;
    const t = this.ctx.currentTime+delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type=tipo; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+.012);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+.02);
  },
  tick(vel){
    if(!this.on||!this.ctx) return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(880+vel*.28, t);
    o.frequency.exponentialRampToValueAtTime(420, t+.05);
    g.gain.setValueAtTime(clamp(.05+vel*.00022,.05,.2), t);
    g.gain.exponentialRampToValueAtTime(.0001, t+.07);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+.09);
  },
  // "whoosh" mientras gira: ruido filtrado con ganancia según velocidad
  whooshOn(){
    if(!this.ctx) return;
    const len = this.ctx.sampleRate*2;
    const buf = this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*.5;
    const src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const f=this.ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=700; f.Q.value=.9;
    const g=this.ctx.createGain(); g.gain.value=0;
    src.connect(f); f.connect(g); g.connect(this.master); src.start();
    this._wh={src,g,f};
  },
  whooshSet(v){ if(this._wh) this._wh.g.gain.setTargetAtTime(clamp(v,0,.09), this.ctx.currentTime, .06); },
  whooshOff(){ if(this._wh){ const w=this._wh; this._wh=null;
    w.g.gain.setTargetAtTime(0,this.ctx.currentTime,.08);
    setTimeout(()=>{try{w.src.stop()}catch(e){}},400); } },
  victoria(){
    if(!this.on||!this.ctx) return;
    // arpegio mayor ascendente + brillito
    [[523.25,0],[659.25,.1],[783.99,.2],[1046.5,.3]].forEach(([f,d])=>this.tono(f,.5,'triangle',.28,d));
    this.tono(1567.98,.9,'sine',.16,.42);
    this.tono(2093,.7,'sine',.1,.5);
    for(let i=0;i<7;i++) this.tono(rnd(1400,2600),.16,'sine',.05,.55+i*.075);
  }
};

/* ---------- Botón de sonido ---------- */
const ICO_ON  = '<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>';
const ICO_OFF = '<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6"/><path d="M16 9l6 6"/>';
const btnSonido = $('#btn-sonido');
function pintarSonido(){
  $('#ico-sonido').innerHTML = Audio_.on ? ICO_ON : ICO_OFF;
  btnSonido.classList.toggle('mudo', !Audio_.on);
  btnSonido.setAttribute('aria-label', Audio_.on?'Silenciar sonido':'Activar sonido');
}
btnSonido.addEventListener('click', e=>{
  e.stopPropagation();
  Audio_.resume();
  Audio_.set(!Audio_.on);
  pintarSonido();
  if(Audio_.on) Audio_.tono(880,.12,'triangle',.2);
});
pintarSonido();

/* ---------- Partículas ---------- */
const cv = $('#fx'), cx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function medir(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize', medir);
addEventListener('orientationchange', ()=>setTimeout(medir,220));
medir();

let parts = [];
const PALETA = ['#F8231C','#3FB411','#F8A00A','#33AFED','#FFC93D','#FFFFFF'];

function centroRuleta(){
  const r = $('#wheel-wrap').getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2, R:r.width/2 };
}

function chispa(){ // destellos del modo atracción
  const c = centroRuleta();
  const a = Math.random()*TAU, d = c.R*rnd(.98,1.3);
  parts.push({ t:'star', x:c.x+Math.cos(a)*d, y:c.y+Math.sin(a)*d,
    vx:rnd(-.14,.14), vy:rnd(-.5,-.16), vida:1, dec:rnd(.005,.011),
    s:rnd(3.6,9.5), rot:Math.random()*TAU, vr:rnd(-.03,.03),
    c: Math.random()<.62?'#FFC93D':'#FFF3C4' });
}
function chispaGiro(vel){ // brillo que despide la ruleta al girar
  const c = centroRuleta();
  const a = Math.random()*TAU, d = c.R*rnd(1.0,1.08);
  parts.push({ t:'star', x:c.x+Math.cos(a)*d, y:c.y+Math.sin(a)*d,
    vx:Math.cos(a)*rnd(.6,2.4)+rnd(-.4,.4), vy:Math.sin(a)*rnd(.6,2.4)+rnd(-1,.2),
    vida:1, dec:rnd(.016,.03), s:rnd(3,8), rot:Math.random()*TAU, vr:rnd(-.14,.14),
    c: PALETA[(Math.random()*PALETA.length)|0] });
}
function confeti(n){
  for(let i=0;i<n;i++){
    parts.push({ t:'conf', x:rnd(-.06,1.06)*W, y:rnd(-.35,-.02)*H,
      vx:rnd(-1.1,1.1), vy:rnd(1.8,5.2), g:rnd(.028,.06),
      vida:1, dec:0, w:rnd(6,13), h:rnd(8,17),
      rot:Math.random()*TAU, vr:rnd(-.18,.18), sw:Math.random()*TAU, vsw:rnd(.05,.13),
      c:PALETA[(Math.random()*PALETA.length)|0] });
  }
}
function estallido(){ // chispas desde el centro al ganar
  const c = centroRuleta();
  for(let i=0;i<52;i++){
    const a=Math.random()*TAU, v=rnd(3,12);
    parts.push({ t:'star', x:c.x, y:c.y, vx:Math.cos(a)*v, vy:Math.sin(a)*v-1.5,
      g:.05, vida:1, dec:rnd(.012,.022), s:rnd(5,13),
      rot:Math.random()*TAU, vr:rnd(-.2,.2), c:PALETA[(Math.random()*PALETA.length)|0] });
  }
}

function dibujarEstrella(x,y,s,rot,color,alpha){
  cx.save(); cx.translate(x,y); cx.rotate(rot); cx.globalAlpha=alpha;
  cx.fillStyle=color; cx.shadowColor=color; cx.shadowBlur=s*1.5;
  cx.beginPath();
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2;
    cx.quadraticCurveTo(Math.cos(a+.7854)*s*.22, Math.sin(a+.7854)*s*.22,
                        Math.cos(a+1.5708)*s,    Math.sin(a+1.5708)*s);
  }
  cx.closePath(); cx.fill(); cx.restore();
}

function pintarParts(dt){
  cx.clearRect(0,0,W,H);
  const f = dt/16.67;
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    if(p.g) p.vy += p.g*f;
    p.x += p.vx*f; p.y += p.vy*f; p.rot += p.vr*f;
    if(p.t==='conf'){
      p.sw += p.vsw*f;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.scale(Math.cos(p.sw),1);
      cx.fillStyle=p.c; cx.globalAlpha=clamp(p.vida,0,1);
      cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cx.restore();
      if(p.y>H+40) parts.splice(i,1);
    }else{
      p.vida -= p.dec*f;
      if(p.vida<=0){ parts.splice(i,1); continue; }
      dibujarEstrella(p.x,p.y,p.s*clamp(p.vida*1.3,0,1),p.rot,p.c,clamp(p.vida,0,1));
    }
  }
}

/* ---------- Motor de la ruleta ---------- */
let estado    = 'idle';   // idle | girando | ganando
let rot       = rnd(0,360);
let spin      = null;
let ultimoTick= -1;
let wobble    = 0;
let acumChispa= 0;

const btnGirar = $('#btn-girar');

function elegirPremio(){
  const pesos = P.map(p=>Math.max(0, +p.peso||0));
  let total = pesos.reduce((a,b)=>a+b,0);
  if(total<=0) return (Math.random()*N)|0;       // si todo está en 0, sorteo parejo
  let r = Math.random()*total;
  for(let i=0;i<N;i++){ r-=pesos[i]; if(r<0) return i; }
  return N-1;
}

/* ángulo del sector que está bajo el puntero, dado el giro actual */
function sectorBajoPuntero(r){
  const th = ((-r)%360+360)%360;
  return Math.floor(th/SECTOR)%N;
}

function girar(){
  if(estado!=='idle') return;
  estado='girando';
  document.body.classList.add('girando');
  btnGirar.disabled = true;

  Audio_.resume();
  Audio_.whooshOn();

  const idx = elegirPremio();
  const objetivoTheta = idx*SECTOR + SECTOR/2 + rnd(-JITTER,JITTER);
  const rObjetivo = ((-objetivoTheta)%360+360)%360;
  const actual = ((rot%360)+360)%360;
  const delta = ((rObjetivo-actual)%360+360)%360;
  const vueltas = Math.floor(rnd(CONFIG.vueltasMin, CONFIG.vueltasMax+1));

  spin = { t0:performance.now(), dur:CONFIG.duracionGiro, desde:rot,
           total:360*vueltas + delta, idx };
  ultimoTick = sectorBajoPuntero(rot);
}

/* Física: retroceso corto (toma impulso) + frenada progresiva (easeOutQuart) */
const RETROCESO = 16; // grados
function curva(t){
  const anticip = t<.13 ? -RETROCESO*Math.sin(t/.13*Math.PI) : 0;
  const u = clamp((t-.13)/.87, 0, 1);
  return { frac: 1-Math.pow(1-u,4), extra: anticip };
}

function ganar(idx){
  estado='ganando';
  const p = P[idx];
  $('#f-premio').textContent = p.nombre;
  $('#f-icono').innerHTML =
    `<svg viewBox="-24 -24 48 48"><g style="--tinta:#1A1A2E">
       <g class="icono" style="stroke-width:1.5">${ICONOS[p.icono]||''}</g></g></svg>`;
  // el ícono del festejo va en el color del premio
  const cont = $('#f-icono').querySelector('svg');
  cont.querySelectorAll('.icono > path, .icono > g > path, .icono > rect, .icono > g > rect')
      .forEach(el=>{ if(!el.getAttribute('fill') && !el.classList.contains('oro')) el.setAttribute('fill', p.color); });
  $('#f-titulo').style.color = p.color;

  $('#festejo').classList.add('on');
  Audio_.victoria();
  estallido();
  confeti(140);
  setTimeout(()=>confeti(80), 420);
  setTimeout(()=>confeti(60), 900);

  const barra = $('#f-barra i');
  barra.style.transition='none'; barra.style.transform='scaleX(1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    barra.style.transition = `transform ${CONFIG.segundosFestejo}s linear`;
    barra.style.transform = 'scaleX(0)';
  }));

  clearTimeout(ganar._t);
  ganar._t = setTimeout(volverAtraccion, CONFIG.segundosFestejo*1000);
}

function volverAtraccion(){
  if(estado!=='ganando') return;
  clearTimeout(ganar._t);
  $('#festejo').classList.remove('on');
  document.body.classList.remove('girando');
  btnGirar.disabled = false;
  estado='idle';
  setTimeout(()=>{ parts = parts.filter(p=>p.t!=='conf'); }, 500);
}

/* ---------- Bucle principal ---------- */
let last = performance.now();
function loop(now){
  const dt = Math.min(now-last, 50); last = now;
  let vel = 0;

  if(estado==='idle'){
    // deriva lenta: la ruleta "respira" y llama la atención de lejos
    rot += 7 * dt/1000;
    acumChispa += dt;
    if(acumChispa > 90){ acumChispa=0; chispa(); }

  }else if(estado==='girando' && spin){
    const t = clamp((now-spin.t0)/spin.dur, 0, 1);
    const c = curva(t);
    const nuevo = spin.desde + spin.total*c.frac + c.extra;
    vel = Math.abs(nuevo-rot)/(dt/1000);   // grados por segundo
    rot = nuevo;

    // tick del puntero al cruzar cada casillero
    const s = sectorBajoPuntero(rot);
    if(s!==ultimoTick){ ultimoTick=s; Audio_.tick(vel); wobble = clamp(vel*.012, 4, 17); }

    Audio_.whooshSet(clamp(vel/3200*.09, 0, .09));
    if(vel>90){
      acumChispa += dt;
      if(acumChispa > 26){ acumChispa=0; chispaGiro(vel); chispaGiro(vel); }
    }

    if(t>=1){
      spin=null;
      Audio_.whooshOff();
      const idx = sectorBajoPuntero(rot);
      setTimeout(()=>ganar(idx), 260);
      estado='frenado';
    }
  }

  wobble *= Math.pow(.86, dt/16.67);
  gPuntero.setAttribute('transform', `rotate(${wobble.toFixed(2)} 0 -108)`);
  gWheel.setAttribute('transform', `rotate(${(rot%360).toFixed(3)})`);

  pintarParts(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---------- Interacción ---------- */
btnGirar.addEventListener('click', ()=>{ Audio_.resume(); girar(); });

// tocar la ruleta también la hace girar (los chicos van a tocarla)
$('#wheel-wrap').addEventListener('click', ()=>{ Audio_.resume(); girar(); });

// tocar durante el festejo → volver antes al modo atracción
$('#festejo').addEventListener('click', volverAtraccion);

// barra espaciadora / Enter para el equipo del stand
addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault();
    if(estado==='ganando') volverAtraccion(); else girar();
  }
});

// pistas rotativas en el modo atracción
const PISTAS = [
  '¡Girá la ruleta y llevate un premio!',
  'Cuatro premios mágicos te esperan ✨',
  'Tocá el botón y descubrí tu sorpresa',
  '¡Todos se llevan algo! Probá suerte 🎁'
];
let iPista = 0;
setInterval(()=>{
  if(estado!=='idle') return;
  const el = $('#pista');
  el.style.opacity = 0;
  setTimeout(()=>{ iPista=(iPista+1)%PISTAS.length; el.textContent=PISTAS[iPista]; el.style.opacity=1; }, 450);
}, 4600);

// mantener la tablet despierta todo el día
let wl = null;
async function despierto(){
  try{
    if('wakeLock' in navigator && document.visibilityState==='visible'){
      wl = await navigator.wakeLock.request('screen');
      wl.addEventListener('release', ()=>{ wl=null; });
    }
  }catch(e){/* file:// o no soportado: se ignora */}
}
despierto();
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && !wl) despierto(); });

// evitar zoom por doble toque y menús contextuales en el stand
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());
let ultimoToque = 0;
document.addEventListener('touchend', e=>{
  const t = Date.now();
  if(t-ultimoToque < 320) e.preventDefault();
  ultimoToque = t;
}, {passive:false});
</script>
